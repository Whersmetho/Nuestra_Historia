<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia</title>

<style>
:root{
    --bg:#0f0f12;
    --primary:#ff4d6d;
    --soft:#ff8fa3;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Blackadder ITC", cursive;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    position:absolute;
    width:100%;
    top:0;
    left:0;
    opacity:0;
    pointer-events:none;
    transition:0.8s ease;
}

.section.active{
    opacity:1;
    pointer-events:auto;
    position:relative;
}

h1{
    font-size:2.3rem;
    margin-bottom:25px;
}

button{
    margin-top:35px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

button:hover{
    background:var(--soft);
    transform:scale(1.05);
}

.typewriter{
    max-width:600px;
    margin:auto;
    white-space:pre-line;
    line-height:1.6;
    font-size:1.1rem;
}

.counter-box{
    margin:25px 0;
    padding:25px;
    border-radius:20px;
    background:rgba(255,77,109,0.08);
    border:1px solid rgba(255,77,109,0.25);
}

.counter-box strong{
    font-size:1.5rem;
    color:var(--soft);
}

.glow{
    color:var(--soft);
    text-shadow:0 0 20px var(--primary);
}

.final-content{
    animation:zoom 8s ease forwards;
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<section class="section active" id="cap1">
<div>
<h1>Capítulo 1</h1>
<div class="typewriter" id="text1"></div>
<button onclick="nextSection(2)">Continuar</button>
</div>
</section>

<section class="section" id="cap2">
<div>
<h1>Capítulo 2</h1>
<div class="counter-box" id="counter"></div>
<div class="counter-box" id="valentineCounter"></div>
<button onclick="nextSection(3)">Continuar</button>
</div>
</section>

<section class="section" id="cap3">
<div>
<h1>Capítulo 3</h1>
<div class="typewriter" id="letter"></div>
<button onclick="startFinal()">Leer el final</button>
</div>
</section>

<section class="section" id="cap4">
<div class="final-content">
<h1 class="glow">Capítulo Final</h1>
<div class="typewriter" id="finalText"></div>
</div>
</section>

<script>
const music=document.getElementById("bgMusic");

document.body.addEventListener("click",()=>{
    music.volume=0.6;
    music.play().catch(()=>{});
},{once:true});

function nextSection(num){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById("cap"+num).classList.add("active");

    if(num===3){
        startLetter();
    }
}

function typeWriter(element,text,speed=40){
    element.innerHTML="";
    let i=0;
    function typing(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,speed);
        }
    }
    typing();
}

/* CAP 1 */
typeWriter(
document.getElementById("text1"),
`Hablamos todos los días.
 Cuando hablamos…
 Todo fluye y lo haces sentir especial.

Molestamos.
Reímos.
Somos tiernos.

Y aunque no tenga nombre lo que somos…
se siente real.`
);

/* CONTADOR DESDE QUE EMPEZÓ */
const startDate=new Date("2026-02-22T00:00:00");

function updateCounter(){
    const now=new Date();
    const diff=now-startDate;

    if(diff<0){
        document.getElementById("counter").innerHTML=
        "Aún no empieza nuestra historia 💫";
        return;
    }

    const d=Math.floor(diff/(1000*60*60*24));
    const h=Math.floor(diff/(1000*60*60))%24;
    const m=Math.floor(diff/(1000*60))%60;
    const s=Math.floor(diff/1000)%60;

    document.getElementById("counter").innerHTML=
    `<div>Desde que todo empezó 💞</div>
     <div style="margin-top:15px">
     <strong>${d}</strong> días 
     <strong>${h}</strong> h 
     <strong>${m}</strong> m 
     <strong>${s}</strong> s
     </div>`;
}
setInterval(updateCounter,1000);
updateCounter();

/* CONTADOR 14 FEBRERO AUTOMÁTICO */
function updateValentine(){
    const now=new Date();
    let year=now.getFullYear();
    let target=new Date(year+"-03-22T00:00:00");

    if(now>target){
        target=new Date((year+1)+"-03-22T00:00:00");
    }

    const diff=target-now;

    const d=Math.floor(diff/(1000*60*60*24));
    const h=Math.floor(diff/(1000*60*60))%24;
    const m=Math.floor(diff/(1000*60))%60;
    const s=Math.floor(diff/1000)%60;

    document.getElementById("valentineCounter").innerHTML=
    `<div>Faltan el dia especial 💌</div>
     <div style="margin-top:15px">
     <strong>${d}</strong> días 
     <strong>${h}</strong> h 
     <strong>${m}</strong> m 
     <strong>${s}</strong> s
     </div>`;
}
setInterval(updateValentine,1000);
updateValentine();

/* CARTA */
function startLetter(){
typeWriter(
document.getElementById("letter"),
`No sé exactamente qué somos.
Pero sé que me gusta cómo se siente.

Me gusta cuando coincidimos.
Cuando nos entendemos sin decir mucho.
Cuando molestamos como si nada…
pero sabemos que hay algo más.

No quiero apresurarlo.
Solo quiero seguir descubriéndolo contigo.`
);
}

/* FINAL */
function startFinal(){
    nextSection(4);
    const finalText=document.getElementById("finalText");

    setTimeout(()=>{
        finalText.innerHTML=`No sé qué vaya a pasar.

No sé qué nombre tiene lo nuestro…

<span class="glow">Pero tiene algo.</span>

Y quiero descubrir qué es… contigo.`;

        fadeMusic();
    },1000);
}

function fadeMusic(){
    let fade=setInterval(()=>{
        if(music.volume>0.05){
            music.volume-=0.05;
        }else{
            music.volume=0;
            clearInterval(fade);
        }
    },200);
}
</script>

</body>
</html>
